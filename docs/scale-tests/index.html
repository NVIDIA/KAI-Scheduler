<!DOCTYPE html>
<!--
  Scale Tests Dashboard — KAI Scheduler
  Fetches ginkgo --json-report results from an S3 bucket and renders them client-side.

  S3 manifest expected at: ${S3_BASE_URL}/public/manifest.json
  Format:
    {
      "runs": [
        { "timestamp": "2024-01-15T10:00:00Z", "path": "public/<run-id>/report.json" }
      ]
    }

  Each report.json is the standard ginkgo v2 --json-report output (array of Report objects).

  The placeholder __S3_BASE_URL__ is replaced by the deploy workflow using the
  SCALE_TESTS_S3_URL repository variable.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KAI Scheduler — Scale Tests</title>
  <style>
    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --surface2: #21262d;
      --border:   #30363d;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --pass:     #3fb950;
      --fail:     #f85149;
      --skip:     #d29922;
      --accent:   #58a6ff;
      --radius:   6px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    .page-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .page-header svg { flex-shrink: 0; }
    .page-header h1 { font-size: 16px; font-weight: 600; }
    .header-stats {
      margin-left: auto;
      display: flex;
      gap: 24px;
      font-size: 11px;
      color: var(--muted);
      text-align: right;
    }
    .header-stat-val { font-size: 20px; font-weight: 700; color: var(--text); display: block; line-height: 1.1; }

    /* ── Controls ────────────────────────────────────────────────────── */
    .controls {
      padding: 8px 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      background: var(--bg);
    }
    .search-wrap { flex: 1; min-width: 180px; position: relative; }
    .search-icon {
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }
    .search {
      width: 100%;
      padding: 5px 10px 5px 30px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search:focus { border-color: var(--accent); }
    .search::placeholder { color: var(--muted); }

    .sep { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }

    .ctrl-label { font-size: 12px; color: var(--muted); flex-shrink: 0; }

    .btn-group { display: flex; }
    .btn-group button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: color 0.1s, background 0.1s;
    }
    .btn-group button:first-child { border-radius: var(--radius) 0 0 var(--radius); }
    .btn-group button:last-child  { border-radius: 0 var(--radius) var(--radius) 0; }
    .btn-group button:not(:first-child) { border-left: none; }
    .btn-group button.active { background: var(--surface2); color: var(--accent); border-color: var(--accent); z-index: 1; position: relative; }
    .btn-group button:hover:not(.active) { color: var(--text); background: var(--surface2); }

    .filter-group { display: flex; gap: 4px; }
    .filter-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid var(--border);
      color: var(--muted);
      background: transparent;
      transition: all 0.1s;
      user-select: none;
    }
    .filter-pill:hover:not(.active) { border-color: var(--text); color: var(--text); }
    .filter-pill.pass.active { border-color: var(--pass); color: var(--pass); background: rgba(63,185,80,0.08); }
    .filter-pill.fail.active { border-color: var(--fail); color: var(--fail); background: rgba(248,81,73,0.08); }
    .filter-pill.skip.active { border-color: var(--skip); color: var(--skip); background: rgba(210,153,34,0.08); }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

    /* ── Summary strip ───────────────────────────────────────────────── */
    .summary {
      padding: 6px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      align-items: center;
    }
    .summary strong { color: var(--text); }

    /* ── Main ────────────────────────────────────────────────────────── */
    main { padding: 16px 24px; max-width: 1280px; margin: 0 auto; }

    .msg { text-align: center; padding: 60px 24px; color: var(--muted); }
    .msg.err { color: var(--fail); }
    .spinner {
      display: inline-block;
      width: 22px; height: 22px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Run card ────────────────────────────────────────────────────── */
    .run-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 8px;
      overflow: hidden;
    }
    .run-header {
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
    }
    .run-header:hover { background: rgba(255,255,255,0.025); }
    .chevron { color: var(--muted); font-size: 10px; transition: transform 0.15s; flex-shrink: 0; }
    .run-card.open .chevron { transform: rotate(90deg); }
    .run-ts { font-size: 13px; font-weight: 600; white-space: nowrap; }
    .run-desc { color: var(--muted); font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
    .run-dur { color: var(--muted); font-size: 11px; font-family: monospace; white-space: nowrap; flex-shrink: 0; }
    .run-counts { margin-left: auto; display: flex; gap: 12px; font-size: 12px; flex-shrink: 0; align-items: center; }
    .c-pass { color: var(--pass); }
    .c-fail { color: var(--fail); }
    .c-skip { color: var(--skip); }
    .c-muted { color: var(--muted); }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
      flex-shrink: 0;
    }
    .badge-pass { background: rgba(63,185,80,0.15); color: var(--pass); }
    .badge-fail { background: rgba(248,81,73,0.15); color: var(--fail); }
    .badge-skip { background: rgba(210,153,34,0.15); color: var(--skip); }

    /* ── Run body ────────────────────────────────────────────────────── */
    .run-body { display: none; }
    .run-card.open .run-body { display: block; }

    .suite-meta {
      padding: 6px 14px;
      background: var(--surface2);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 20px;
      font-size: 11px;
      color: var(--muted);
      flex-wrap: wrap;
      align-items: center;
    }
    .suite-meta strong { color: var(--text); }
    .suite-warn {
      color: var(--skip);
      background: rgba(210,153,34,0.08);
      border: 1px solid rgba(210,153,34,0.2);
      border-radius: 4px;
      padding: 1px 7px;
      font-size: 11px;
    }

    /* ── Spec rows ───────────────────────────────────────────────────── */
    .spec-row {
      padding: 7px 14px 7px 32px;
      border-top: 1px solid rgba(48,54,61,0.5);
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .spec-row.match { background: rgba(88,166,255,0.04); }
    .spec-state-icon { flex-shrink: 0; font-size: 13px; margin-top: 1px; width: 16px; text-align: center; }
    .spec-body { flex: 1; min-width: 0; }
    .spec-path { font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .spec-leaf { font-size: 13px; font-weight: 500; margin-top: 1px; }
    .spec-labels { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 3px; }
    .label {
      background: rgba(88,166,255,0.1);
      color: var(--accent);
      padding: 0 5px;
      border-radius: 3px;
      font-size: 10px;
    }
    .spec-meta { display: flex; gap: 14px; margin-top: 3px; font-size: 11px; color: var(--muted); }
    .spec-meta .mono { font-family: monospace; }

    .detail-btn {
      flex-shrink: 0;
      padding: 2px 8px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.1s;
      margin-top: 1px;
      white-space: nowrap;
    }
    .detail-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Spec detail panel ───────────────────────────────────────────── */
    .spec-detail {
      display: none;
      margin: 6px 14px 6px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      font-size: 12px;
    }
    .spec-detail.open { display: block; }
    .detail-section {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
    }
    .detail-section:last-child { border-bottom: none; }
    .detail-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .kv { display: grid; grid-template-columns: max-content 1fr; gap: 3px 16px; }
    .kv-k { color: var(--muted); font-family: monospace; }
    .kv-v { font-family: monospace; color: var(--text); word-break: break-all; }
    .pre {
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', monospace;
      font-size: 11px;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
      max-height: 300px;
      overflow-y: auto;
      line-height: 1.6;
    }
    .pre.err { color: #ff7b72; }
    .entry-block { margin-bottom: 10px; }
    .entry-block:last-child { margin-bottom: 0; }
    .entry-name { font-weight: 600; color: var(--text); margin-bottom: 3px; font-size: 12px; }
    .entry-val { font-family: monospace; font-size: 11px; white-space: pre-wrap; color: var(--text); }
  </style>
</head>
<body>

<!-- ── Page header ─────────────────────────────────────────────────────── -->
<header class="page-header">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"
          stroke="#58a6ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <h1>KAI Scheduler — Scale Tests</h1>
  <div class="header-stats" id="header-stats" aria-live="polite"></div>
</header>

<!-- ── Controls ────────────────────────────────────────────────────────── -->
<div class="controls">
  <div class="search-wrap">
    <svg class="search-icon" width="14" height="14" viewBox="0 0 16 16" aria-hidden="true">
      <path fill="var(--muted)" d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398l3.85 3.85a1 1 0 0 0 1.415-1.415l-3.868-3.833zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
    </svg>
    <input class="search" id="search" type="search" placeholder="Search tests, labels, output, failure messages…" autocomplete="off">
  </div>

  <div class="sep" aria-hidden="true"></div>
  <span class="ctrl-label">Sort</span>
  <div class="btn-group" role="group" aria-label="Sort order">
    <button class="active" data-sort="time">Time</button>
    <button data-sort="name">Name</button>
    <button data-sort="status">Status</button>
  </div>
  <div id="sort-dir-btn-wrap">
    <div class="btn-group">
      <button id="sort-dir" title="Toggle sort direction">▼</button>
    </div>
  </div>

  <div class="sep" aria-hidden="true"></div>
  <div class="filter-group" role="group" aria-label="Filter by status">
    <button class="filter-pill pass active" id="fp-pass" aria-pressed="true"><span class="dot"></span>Passed</button>
    <button class="filter-pill fail active" id="fp-fail" aria-pressed="true"><span class="dot"></span>Failed</button>
    <button class="filter-pill skip active" id="fp-skip" aria-pressed="true"><span class="dot"></span>Skipped</button>
  </div>
</div>

<!-- ── Summary strip ───────────────────────────────────────────────────── -->
<div class="summary" id="summary" aria-live="polite">Loading…</div>

<!-- ── Run list ────────────────────────────────────────────────────────── -->
<main id="main">
  <div class="msg"><div class="spinner"></div><br>Fetching scale test results…</div>
</main>

<script>
'use strict';

// Injected by the deploy workflow. Falls back to window override or example data.
// When __S3_BASE_URL__ has not been replaced, '.' is used so that fetch paths like
// ./public/manifest.json resolve correctly relative to the page.
const _s3raw = typeof window.SCALE_TESTS_S3_BASE_URL !== 'undefined'
  ? window.SCALE_TESTS_S3_BASE_URL : '__S3_BASE_URL__';
const S3_BASE_URL = (_s3raw === '__S3_BASE_URL__' ? '.' : _s3raw).replace(/\/$/, '');

const THIRTY_DAYS_MS = 30 * 24 * 60 * 60 * 1000;

// ── State ──────────────────────────────────────────────────────────────────
let allRuns  = [];   // { timestamp, path, suite, specs }[]  (populated progressively)
let sortKey  = 'time';
let sortAsc  = false;
let filterPass = true, filterFail = true, filterSkip = true;
let searchQuery = '';

// ── Utilities ──────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function nsToHuman(ns) {
  if (!ns) return '—';
  const s = ns / 1e9;
  if (s < 60)   return `${s.toFixed(1)}s`;
  const m = Math.floor(s / 60);
  if (m < 60)   return `${m}m ${Math.round(s % 60)}s`;
  const h = Math.floor(m / 60);
  return `${h}h ${m % 60}m`;
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }) +
    ' ' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
}

function fmtTime(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function stateIcon(state) {
  switch (state) {
    case 'passed':    return '<span class="c-pass" aria-label="passed">✓</span>';
    case 'failed':    return '<span class="c-fail" aria-label="failed">✗</span>';
    case 'skipped':   return '<span class="c-skip" aria-label="skipped">—</span>';
    case 'pending':   return '<span class="c-muted" aria-label="pending">○</span>';
    default:          return '<span class="c-muted">?</span>';
  }
}

function badgeHtml(state) {
  const cls = state === 'passed' ? 'pass' : state === 'failed' ? 'fail' : 'skip';
  return `<span class="badge badge-${cls}">${stateIcon(state)} ${esc(state)}</span>`;
}

function specFullText(spec) {
  return [...(spec.ContainerHierarchyTexts || []), spec.LeafNodeText || ''].join(' › ');
}

function specSearchable(spec) {
  const parts = [
    specFullText(spec),
    spec.State || '',
    ...(spec.LeafNodeLabels || []),
    spec.CapturedGinkgoWriterOutput || '',
    spec.CapturedStdOutErr || '',
    spec.Failure?.Message || '',
    spec.Failure?.Location ? `${spec.Failure.Location.FileName}:${spec.Failure.Location.LineNumber}` : '',
    ...(spec.SpecialSuiteFailureReasons || []),
    ...(spec.ReportEntries || []).map(e => `${e.Name} ${e.Value?.AsJSON || JSON.stringify(e.Value || '')}`),
    ...(spec.AdditionalFailures || []).map(f => f.Message || ''),
  ];
  return parts.join(' ').toLowerCase();
}

function specVisible(spec) {
  if (!filterPass && spec.State === 'passed')   return false;
  if (!filterFail && spec.State === 'failed')   return false;
  if (!filterSkip && (spec.State === 'skipped' || spec.State === 'pending')) return false;
  if (searchQuery && !specSearchable(spec).includes(searchQuery.toLowerCase())) return false;
  return true;
}

// ── Rendering ──────────────────────────────────────────────────────────────
let _detailUid = 0;
function uid() { return `d${++_detailUid}`; }

function renderFailure(f) {
  if (!f) return '';
  const loc = f.Location ? `${esc(f.Location.FileName || '')}:${f.Location.LineNumber || ''}` : '';
  return `
    <div class="detail-section">
      <div class="detail-title">Failure</div>
      <div class="pre err">${esc(f.Message || '')}</div>
      ${loc ? `<div style="margin-top:6px;font-size:11px;color:var(--muted);font-family:monospace">${loc}</div>` : ''}
      ${f.ForwardedPanics ? `<div class="pre err" style="margin-top:8px">${esc(f.ForwardedPanics)}</div>` : ''}
    </div>`;
}

function renderReportEntries(entries) {
  if (!entries?.length) return '';
  const html = entries.map(e => {
    let val = '';
    try {
      val = e.Value?.AsJSON
        ? JSON.stringify(JSON.parse(e.Value.AsJSON), null, 2)
        : JSON.stringify(e.Value ?? '', null, 2);
    } catch { val = String(e.Value ?? ''); }
    return `<div class="entry-block">
      <div class="entry-name">${esc(e.Name)}</div>
      <div class="entry-val">${esc(val)}</div>
    </div>`;
  }).join('');
  return `<div class="detail-section"><div class="detail-title">Report Entries</div>${html}</div>`;
}

function renderSpecDetail(spec, detailId) {
  const hasContent = spec.Failure
    || (spec.ReportEntries?.length)
    || spec.CapturedGinkgoWriterOutput
    || spec.CapturedStdOutErr
    || (spec.AdditionalFailures?.length);

  if (!hasContent) return '';

  const loc = spec.LeafNodeLocation
    ? `${esc(spec.LeafNodeLocation.FileName || '')}:${spec.LeafNodeLocation.LineNumber || ''}`
    : '—';

  const sections = [
    // Metadata
    `<div class="detail-section">
      <div class="detail-title">Spec Info</div>
      <div class="kv">
        <span class="kv-k">Type</span>       <span class="kv-v">${esc(spec.LeafNodeType || '')}</span>
        <span class="kv-k">State</span>      <span class="kv-v">${esc(spec.State || '')}</span>
        <span class="kv-k">Location</span>   <span class="kv-v">${loc}</span>
        <span class="kv-k">Started</span>    <span class="kv-v">${esc(fmtTime(spec.StartTime))}</span>
        <span class="kv-k">Ended</span>      <span class="kv-v">${esc(fmtTime(spec.EndTime))}</span>
        <span class="kv-k">Duration</span>   <span class="kv-v">${esc(nsToHuman(spec.RunTime))}</span>
        <span class="kv-k">Attempts</span>   <span class="kv-v">${spec.NumAttempts ?? 1}${spec.MaxFlakeAttempts ? ` / ${spec.MaxFlakeAttempts} max flake` : ''}</span>
        ${spec.IsSerial ? `<span class="kv-k">Serial</span><span class="kv-v">yes</span>` : ''}
        ${spec.IsInOrderedContainer ? `<span class="kv-k">Ordered</span><span class="kv-v">yes</span>` : ''}
      </div>
    </div>`,

    // Primary failure
    renderFailure(spec.Failure),

    // Additional failures (flake retries, etc.)
    ...(spec.AdditionalFailures || []).map((f, i) =>
      renderFailure({ ...f, Message: `[Additional failure ${i + 1}] ${f.Message || ''}` })
    ),

    // Report entries (custom test data from AddReportEntry)
    renderReportEntries(spec.ReportEntries),

    // Captured output
    spec.CapturedGinkgoWriterOutput ? `
      <div class="detail-section">
        <div class="detail-title">Output</div>
        <div class="pre">${esc(spec.CapturedGinkgoWriterOutput)}</div>
      </div>` : '',

    spec.CapturedStdOutErr ? `
      <div class="detail-section">
        <div class="detail-title">Stdout / Stderr</div>
        <div class="pre">${esc(spec.CapturedStdOutErr)}</div>
      </div>` : '',
  ];

  return `<div class="spec-detail" id="${detailId}">${sections.join('')}</div>`;
}

function renderSpec(spec) {
  if (!specVisible(spec)) return '';

  const hierarchy = (spec.ContainerHierarchyTexts || []).join(' › ');
  const labels    = (spec.LeafNodeLabels || []).map(l => `<span class="label">${esc(l)}</span>`).join('');
  const dur       = nsToHuman(spec.RunTime);
  const detailId  = uid();

  const detail    = renderSpecDetail(spec, detailId);
  const hasDetail = !!detail;

  const isMatch = searchQuery && specSearchable(spec).includes(searchQuery.toLowerCase());

  return `
    <div class="spec-row${isMatch ? ' match' : ''}">
      <div class="spec-state-icon">${stateIcon(spec.State)}</div>
      <div class="spec-body">
        ${hierarchy ? `<div class="spec-path">${esc(hierarchy)}</div>` : ''}
        <div class="spec-leaf${spec.State === 'failed' ? ' c-fail' : ''}">${esc(spec.LeafNodeText || '')}</div>
        ${labels ? `<div class="spec-labels">${labels}</div>` : ''}
        <div class="spec-meta">
          <span class="mono">${esc(dur)}</span>
          <span>${esc(fmtTime(spec.StartTime))}</span>
          ${spec.NumAttempts > 1 ? `<span class="c-skip">${spec.NumAttempts} attempts</span>` : ''}
        </div>
        ${detail}
      </div>
      ${hasDetail ? `<button class="detail-btn" onclick="toggleDetail('${detailId}')">details</button>` : ''}
    </div>`;
}

function renderSuiteMeta(suite) {
  const warnings = (suite.SpecialSuiteFailureReasons || []);
  const pre = suite.PreRunStats || {};
  return `
    <div class="suite-meta">
      <span>Suite: <strong>${esc(suite.SuiteDescription || 'Scale Suite')}</strong></span>
      <span>Start: <strong>${esc(fmtDate(suite.StartTime))}</strong></span>
      <span>Duration: <strong>${esc(nsToHuman(suite.RunTime))}</strong></span>
      ${pre.TotalSpecs != null ? `<span>Total specs: <strong>${pre.TotalSpecs}</strong></span>` : ''}
      ${pre.SpecsThatWillRun != null ? `<span>Will run: <strong>${pre.SpecsThatWillRun}</strong></span>` : ''}
      ${suite.RunningInParallel ? `<span>Parallel: <strong>yes</strong></span>` : ''}
      ${warnings.map(w => `<span class="suite-warn">${esc(w)}</span>`).join('')}
    </div>`;
}

function sortedSpecs(specs) {
  const copy = [...specs];
  if (sortKey === 'name') {
    copy.sort((a, b) => {
      const diff = specFullText(a).localeCompare(specFullText(b));
      return sortAsc ? diff : -diff;
    });
  } else if (sortKey === 'status') {
    const order = { failed: 0, skipped: 1, pending: 2, passed: 3 };
    copy.sort((a, b) => {
      const diff = (order[a.State] ?? 4) - (order[b.State] ?? 4);
      return sortAsc ? -diff : diff;
    });
  }
  // 'time': keep original execution order from ginkgo report
  return copy;
}

function renderRun(run, runIdx) {
  const specs = sortedSpecs(run.specs);
  const specHtml = specs.map(renderSpec).join('');
  if (!specHtml) return '';

  const ts   = new Date(run.timestamp);
  const tsStr = fmtDate(run.timestamp);

  const passed  = run.specs.filter(s => s.State === 'passed').length;
  const failed  = run.specs.filter(s => s.State === 'failed').length;
  const skipped = run.specs.filter(s => s.State === 'skipped' || s.State === 'pending').length;

  const overall = failed > 0 ? 'failed' : 'passed';

  const autoOpen = searchQuery.length > 0 || failed > 0;
  const runId = `run-${runIdx}`;

  return `
    <div class="run-card${autoOpen ? ' open' : ''}" id="${runId}">
      <div class="run-header" onclick="toggleRun('${runId}')" role="button" tabindex="0"
           aria-expanded="${autoOpen}" onkeydown="if(event.key==='Enter'||event.key===' ')toggleRun('${runId}')">
        <span class="chevron" aria-hidden="true">▶</span>
        <span class="run-ts">${esc(tsStr)}</span>
        <span class="run-desc">${esc(run.suite?.SuiteDescription || 'Scale Suite')}</span>
        <span class="run-dur">${esc(nsToHuman(run.suite?.RunTime))}</span>
        <div class="run-counts">
          ${passed  > 0 ? `<span class="c-pass">✓ ${passed}</span>`   : ''}
          ${failed  > 0 ? `<span class="c-fail">✗ ${failed}</span>`   : ''}
          ${skipped > 0 ? `<span class="c-skip">— ${skipped}</span>` : ''}
          ${badgeHtml(overall)}
        </div>
      </div>
      <div class="run-body">
        ${renderSuiteMeta(run.suite || {})}
        <div class="specs-container">${specHtml}</div>
      </div>
    </div>`;
}

function sortedRuns() {
  const copy = [...allRuns];
  if (sortKey === 'time') {
    copy.sort((a, b) => {
      const diff = new Date(a.timestamp) - new Date(b.timestamp);
      return sortAsc ? diff : -diff;
    });
  } else if (sortKey === 'status') {
    copy.sort((a, b) => {
      const af = a.specs.some(s => s.State === 'failed') ? 0 : 1;
      const bf = b.specs.some(s => s.State === 'failed') ? 0 : 1;
      const diff = af - bf;
      return sortAsc ? -diff : diff;
    });
  } else if (sortKey === 'name') {
    copy.sort((a, b) => {
      const diff = (a.suite?.SuiteDescription || '').localeCompare(b.suite?.SuiteDescription || '');
      return sortAsc ? diff : -diff;
    });
  }
  return copy;
}

function renderAll() {
  const sorted  = sortedRuns();
  const visible = sorted.filter(r => r.specs.some(specVisible));

  // Header stats
  const totalRuns  = allRuns.length;
  const passedRuns = allRuns.filter(r => !r.specs.some(s => s.State === 'failed')).length;
  const failedRuns = totalRuns - passedRuns;
  document.getElementById('header-stats').innerHTML = `
    <div class="header-stat">
      <span class="header-stat-val">${totalRuns}</span>
      runs (30d)
    </div>
    <div class="header-stat">
      <span class="header-stat-val c-pass">${passedRuns}</span>
      all passed
    </div>
    ${failedRuns > 0 ? `<div class="header-stat">
      <span class="header-stat-val c-fail">${failedRuns}</span>
      with failures
    </div>` : ''}`;

  // Summary
  const totalSpecs  = allRuns.reduce((n, r) => n + r.specs.length, 0);
  document.getElementById('summary').innerHTML =
    `Showing <strong>${visible.length}</strong> of <strong>${totalRuns}</strong> runs
     &nbsp;·&nbsp; <strong>${totalSpecs}</strong> total specs
     ${searchQuery ? `&nbsp;·&nbsp; filtering by <strong>"${esc(searchQuery)}"</strong>` : ''}`;

  const html = visible.map((r, i) => renderRun(r, i)).join('');
  document.getElementById('main').innerHTML =
    html || '<div class="msg">No results match your filters.</div>';
}

// ── Toggle helpers (called from inline onclick) ────────────────────────────
function toggleRun(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const open = el.classList.toggle('open');
  el.querySelector('.run-header')?.setAttribute('aria-expanded', String(open));
}

function toggleDetail(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

// ── Data loading ───────────────────────────────────────────────────────────
async function loadManifest() {
  const res = await fetch(`${S3_BASE_URL}/public/manifest.json`, { cache: 'no-cache' });
  if (!res.ok) throw new Error(`manifest.json: HTTP ${res.status}`);
  return res.json();
}

async function loadReport(path) {
  const res = await fetch(`${S3_BASE_URL}/${path}`, { cache: 'no-cache' });
  if (!res.ok) throw new Error(`${path}: HTTP ${res.status}`);
  return res.json();
}

function processReport(reportJson, meta) {
  // ginkgo --json-report produces an array of Report objects
  const reports = Array.isArray(reportJson) ? reportJson : [reportJson];
  const suite   = reports[0] || {};
  // Filter to "It" nodes and any non-It nodes that failed (e.g. BeforeAll failures)
  const specs   = (suite.SpecReports || []).filter(
    s => s.LeafNodeType === 'It' || s.State === 'failed'
  );
  return { timestamp: meta.timestamp, path: meta.path, suite, specs };
}

async function init() {
  const mainEl = document.getElementById('main');
  try {
    const manifest = await loadManifest();
    const cutoff   = Date.now() - THIRTY_DAYS_MS;
    const recent   = (manifest.runs || [])
      .filter(r => new Date(r.timestamp).getTime() >= cutoff)
      .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));  // newest first for loading order

    document.getElementById('summary').innerHTML =
      `Loading <strong>${recent.length}</strong> runs from the last 30 days…`;

    if (!recent.length) {
      mainEl.innerHTML = '<div class="msg">No runs found in the last 30 days.</div>';
      return;
    }

    // Fetch reports in batches for progressive display
    const BATCH = 5;
    for (let i = 0; i < recent.length; i += BATCH) {
      const batch   = recent.slice(i, i + BATCH);
      const results = await Promise.allSettled(batch.map(r => loadReport(r.path)));
      results.forEach((result, j) => {
        if (result.status === 'fulfilled') {
          allRuns.push(processReport(result.value, batch[j]));
        } else {
          console.warn('[scale-tests] Failed to load report:', batch[j].path, result.reason);
        }
      });
      renderAll();
    }
  } catch (err) {
    mainEl.innerHTML = `<div class="msg err">
      <strong>Error loading results</strong><br><br>${esc(err.message)}
      <br><br><span style="font-size:12px;color:var(--muted)">
        S3 base URL: <code>${esc(S3_BASE_URL)}</code>
      </span>
    </div>`;
    document.getElementById('summary').textContent = '';
    console.error('[scale-tests]', err);
  }
}

// ── Event wiring ───────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  renderAll();
});

document.querySelectorAll('.btn-group[aria-label="Sort order"] button').forEach(btn => {
  btn.addEventListener('click', () => {
    const key = btn.dataset.sort;
    if (sortKey === key) {
      sortAsc = !sortAsc;
    } else {
      sortKey = key;
      sortAsc = key === 'name';
    }
    document.querySelectorAll('.btn-group[aria-label="Sort order"] button')
      .forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('sort-dir').textContent = sortAsc ? '▲' : '▼';
    renderAll();
  });
});

document.getElementById('sort-dir').addEventListener('click', () => {
  sortAsc = !sortAsc;
  document.getElementById('sort-dir').textContent = sortAsc ? '▲' : '▼';
  renderAll();
});

[['fp-pass', () => { filterPass = !filterPass; return filterPass; }],
 ['fp-fail', () => { filterFail = !filterFail; return filterFail; }],
 ['fp-skip', () => { filterSkip = !filterSkip; return filterSkip; }],
].forEach(([id, toggle]) => {
  document.getElementById(id).addEventListener('click', function () {
    const active = toggle();
    this.classList.toggle('active', active);
    this.setAttribute('aria-pressed', String(active));
    renderAll();
  });
});

init();
</script>
</body>
